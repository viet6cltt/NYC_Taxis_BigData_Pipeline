apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: kafka
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      nodeSelector:
        role: storage
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: nyc-taxi-cluster
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "my-kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: kafka
spec:
  selector:
    app: kafka-ui
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080